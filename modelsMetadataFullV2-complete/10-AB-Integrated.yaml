AB-Integrated:
  title: "Embedded OFAM3–WOMBAT Coupled Ocean–Biogeochemistry Model"
  unique_identifier: "OFAM3_WOMBAT_Embedded_2013"
  model_version: "OFAM3 v3.0 + WOMBAT 2013.1"
  description: >
    An embedded 3D coupled system where the OFAM3 eddy-resolving ocean
    circulation model calls the WOMBAT NPZD-type biogeochemical module in-memory
    at each timestep. The configuration described in Oke et al. 2013 uses a 1/10°
    z*-coordinate grid from 75°S to 75°N to simulate mesoscale dynamics and
    large-scale biogeochemical cycling.

  keywords:
    - Ocean circulation
    - Biogeochemistry
    - NPZD model
    - Eddy-resolving
    - Carbon cycle
    - Embedded coupling

  model_type: "Mechanistic embedded physical–biogeochemical coupled system"
  scope: "Near-global ocean circulation with embedded NPZD-type biogeochemistry"

  purpose_pattern:
    purpose: >
      Quantify physical–biogeochemical interactions, including nutrient and
      carbon cycling, chlorophyll distributions, and ecosystem variability, in
      an eddy-resolving near-global ocean configuration.
    pattern: >
      Embedded coupling: WOMBAT is called directly from OFAM3’s time-stepping
      loop in lockstep with physical integration.

  assumptions:
    - "OFAM3 provides the resolved 3D physical state (velocity, temperature, salinity, MLD)."
    - "WOMBAT uses NPZD-type equations with Redfield-based stoichiometry and simple ecosystem structure."
    - "Air–sea gas exchange is parameterized using winds and climatological ice cover."
    - "Coupled system shares the same 1/10° grid, vertical coordinate, and timestep."

  dimensionality: "3D (longitude, latitude, depth)"
  spatial_extent: "Near-global ocean (75°S–75°N, all longitudes)"
  spatial_resolution: "1/10° horizontal; 51 vertical levels with 5–10 m spacing in upper 200 m"
  variable_spatial_resolution: true

  temporal_extent: "Multi-decadal integrations (32-year experiment; 18-year coupled analysis period)"
  temporal_resolution: "Physical timesteps minutes; biogeochemistry updated every physical step; diagnostics daily to monthly"
  variable_temporal_resolution: true

  calibration_tools_data: >
    Combined use of ERA-Interim forcing, observed transports, satellite SST and
    SLA, and global chlorophyll, nutrient, and carbon-cycle datasets to tune and
    evaluate the coupled system.

  publications:
    - "Oke et al., 2013, Geosci. Model Dev., 6, 591–615"

  conceptual_evaluation: >
    The embedded OFAM3–WOMBAT system reproduces large-scale circulation and
    biogeochemical patterns, including ENSO-related chlorophyll and CO₂ flux
    variability, within observational uncertainties.

  validation_capabilities: >
    Supports concurrent validation of physical and biogeochemical fields against
    SST, SLA, mixed layer depth, chlorophyll-a, nutrient distributions, and
    carbon/oxygen diagnostics as reported by Oke et al. 2013.

  sensitivity_analysis: >
    Sensitivity experiments for mixing, forcing, restoring timescales, and key
    biogeochemical parameters and limitations (e.g., nutrient/light controls)
    are supported via alternative namelist configurations.

  uncertainty_analysis: >
    Uncertainty assessed via scenario runs and comparison against multiple
    observational datasets for both physical and biogeochemical variables.

  conceptual_consistency_mismatch: >
    Physical and biogeochemical components share the same grid and timestep and
    are tightly embedded; residual conceptual mismatch arises from simplified
    NPZD representation of ecosystems and assumptions in Redfield-based
    stoichiometry.

  provenance_and_accessibility_gap: >
    The embedded configuration and evaluation are described in Oke et al. 2013,
    but exact source code, tuning, and operational configuration files are
    institutionally maintained (CSIRO/BOM) with no public version-controlled
    repository.

  license: "Research/institutional use (CSIRO/Bureau of Meteorology)."
  license_incompatibility: "proprietary"

  landing_page: "http://www.bom.gov.au/oceanography/forecasts/"
  distribution_version: "2013 embedded OFAM3–WOMBAT configuration"

  programming_language:
    family: "Native_C_CPP_Fortran_Family"
    languages:
      - "Fortran 90 (MOM4p1/OFAM3 physical core)"
      - "Fortran 90 (embedded WOMBAT biogeochemistry)"

  software_requirements: >
    Fortran 90 toolchain with C_ABI compatibility, MPI for distributed-memory
    parallelism, NetCDF4_Family for I/O; same HPC environment as OFAM3.

  hardware_requirements: "HPC cluster with sufficient memory and CPU to run 1/10° eddy-resolving coupled integrations."

  execution_instructions: >
    Build OFAM3 with the WOMBAT module enabled, configure coupled namelists for
    both physical and biogeochemical parameters, and launch the integrated
    executable under MPI; the embedding ensures WOMBAT is called every physical
    timestep.

  parallel_execution: true

  communication_mechanism: >
    Embedded, in-memory direct calls from OFAM3 to WOMBAT inside the MOM4p1
    time-stepping loop, distributed across MPI ranks (no file-based coupling).

  error_handling: >
    Shared with OFAM3: runtime checks on physical and tracer fields; coupled run
    aborts synchronously on instability, allowing restart from consistent
    NetCDF/binary restart files.

  implementation_verification: >
    Verified in Oke et al. 2013 via comparison of coupled circulation and
    biogeochemical fields with multiple observational datasets (SST, SLA,
    chlorophyll, nutrients, CO₂ flux).

  source_code_availability: false

  parameters:
    - name: "OFAM3_WOMBAT_Coupling_Parameters"
      description: >
        Parameters controlling timestep alignment, tracer advection/diffusion,
        and coupling of physical tendencies with biogeochemical source–sink
        terms in the embedded system.
      format: "txt (namelist)"
      unit: "varies"
      datatype: "float, integer, logical"
      valid_range: "Physically and biologically meaningful ranges"
      default: "As used in the embedded configuration described in Oke et al. 2013"

  datasets:
    - uid: "OFAM3_WOMBAT_Forcing_And_Validation"
      version: "2013"
      access_url: ""
      dependencies:
        - "ERA-Interim surface fluxes"
        - "Climatological nutrient and carbon-cycle datasets for evaluation"
        - "Satellite SST, SLA, and chlorophyll-a products"

  active_edge_io:
    formats:
      - netcdf
    whole_model_information_fields: >
      NetCDF output of 3D physical state (T, S, velocity), MLD, and 3D
      biogeochemical tracers (nutrients, chlorophyll, carbon, oxygen), plus
      restart files containing coupled physical and biogeochemical state.

  input:
    description: >
      OFAM3 receives ERA-Interim surface forcing and climatological restoring
      fields; WOMBAT receives the evolving physical state (T, S, velocity, MLD)
      and external forcings (e.g., atmospheric CO₂, iron deposition) as
      in-memory inputs at each step.
    format: "netcdf (external forcing) + in-memory (OFAM3→WOMBAT)"
    variables:
      - 3D_physical_state_from_OFAM3       # T, S, velocity, MLD
      - atmospheric_forcing_fields         # ERA-Interim fluxes
      - external_biogeochemical_forcings   # iron deposition, atmospheric CO₂
    units: "Model units consistent with OFAM3/WOMBAT namelists"

  output:
    format:
      - "netcdf"
    variables: >
      Coupled 3D physical fields (T, S, velocity, MLD) and biogeochemical
      tracers (nutrients, chlorophyll-a, carbon, oxygen, CO₂ fluxes).
    units:
      - "°C"
      - "psu"
      - "m"
      - "m s⁻¹"
      - "mmol m⁻³"
      - "mg Chl a m⁻³"
      - "µmol O₂ L⁻¹"
      - "PgC yr⁻¹"
    verification: >
      Validated against SeaWiFS chlorophyll, nutrient and oxygen climatologies,
      and air–sea CO₂ estimates in the Oke et al. 2013 analysis.
    corroboration: >
      ENSO-related variability in chlorophyll and CO₂ flux and large-scale
      seasonal cycles match observed patterns.

  integration:
    pattern: "embedded"
    submodels:
      - "OFAM3 (MOM4p1-based physical ocean model)"
      - "WOMBAT (NPZD-type biogeochemical module)"
    execution_constraints: >
      Synchronous, lockstep integration: WOMBAT is called every OFAM3 timestep
      on the same 3D grid; tight coupling requires consistent tracer advection
      and conservation across MPI ranks.
    acknowledgment_protocols: >
      Cite Oke et al. 2013 GMD as the reference for the embedded OFAM3–WOMBAT
      system and acknowledge CSIRO/BOM when using the configuration or its
      outputs.
    data_synchronization: >
      Low-latency in-memory exchange at every timestep (same time step, same
      grid); restart files contain synchronized physical and biogeochemical
      state for seamless continuation.
