Intended_Model:
  title: "Integrated FLake → PCLake+ → Ecosystem Services Framework"
  unique_identifier: "FLake_PCLake_ES_Integrated_2023"
  model_version: "1.0"

  description: >
    A climate–ecology–ecosystem-services modeling framework. FLake simulates
    stratification and thermal structure under climate scenarios. Its outputs
    (mixing depth, temperature profile) force PCLake+, which simulates nutrient
    cycling, phytoplankton groups, macrophytes, oxygen, and food web dynamics.
    An ecosystem services (ES) module converts ecological states into ES
    provisioning scores using threshold-based suitability functions.

  keywords:
    - Coupled modeling
    - Stratification
    - Eutrophication
    - Ecosystem services
    - Climate scenarios
    - Restoration scenarios

  scope: "Simulation of physical, ecological, and ES processes in freshwater lakes"

  purpose_pattern:
    purpose: >
      Simulate the combined physical, ecological, and ecosystem-service response
      of lakes to climate change and management interventions.
    pattern: "One-way sequential coupling (physical → ecological → ES)"

  assumptions: 
assumptions:


  dimensionality: "1D"
  spatial_extent: "Vertical lake column"
  spatial_resolution: "Layered structure inherited from FLake and PCLake+"
  variable_spatial_resolution: true

  temporal_extent: "Historical + 2050 climate projections"
  temporal_resolution: "Hourly to daily"
