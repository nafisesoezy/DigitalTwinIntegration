intended_Model:
  title: "Integrated Plant–Soil Feedback Model"
  unique_identifier: "Integrated_PSF_Model_2017"
  model_version: "1.0"

  description: >
    A tightly coupled spatially explicit modeling framework integrating an
    individual-based plant model (IBM) with a cellular automaton soil feedback
    model. Plants modify soil toxicity, which subsequently affects plant
    establishment through conspecific negative feedback (PSNF). The system
    reproduces vegetation patchiness, Janzen–Connell gaps, and multi-scale PSNF
    patterns described in Vincenot 2017.

  keywords:
    - Coupled model
    - Plant–soil feedback


  model_type: "Mechanistic"
  scope: "Landscape-level vegetation–soil feedback"

  purpose_pattern:
    purpose: "Simulate vegetation–soil coevolution under PSNF processes"
    pattern: "Bidirectional: plants modify soil; soil modifies plant establishment"

  assumptions: ""

  dimensionality: "2D"
  spatial_extent: "Grid-based ecological landscape"
  spatial_resolution: "1 m²"
  variable_spatial_resolution: false

  temporal_extent: "Decades"
  temporal_resolution: "Annual"
  variable_temporal_resolution: false

  calibration_tools_data: ""

  publications:
