CLM4_5_Lake:
  title: "WRF Embedded 1-D Lake Scheme (LISSS/CLM4.5-derived)"
  unique_identifier: CLM4.5_Lake_LISSS_WRF_2016
  model_version: "CLM4.5 lake scheme as embedded in WRF v3.6+"

  description: >
    A 1-D thermal diffusion lake column with layered water, ice, snow, and sediment.
    The scheme computes lake surface temperature, ice/snow evolution, and air–lake fluxes
    in response to WRF near-surface meteorology and radiation. It is embedded as a
    surface tile in WRF, exchanging state and fluxes in-memory at each physics time step.

  keywords:
    - Lake column
    - Thermal diffusion
    - Ice/snow on lakes
    - Surface fluxes
    - Dynamic albedo
    - WRF-lake

  model_type: Mechanistic
  scope: Grid-point lake representation within a regional NWP/RCM

  purpose_pattern:
    purpose: "Provide physically consistent lower-boundary lake state and fluxes to the host atmosphere"
    pattern: "Layered 1-D column with prognostic temperature profiles embedded as a surface tile"

  assumptions:
    - Horizontally homogeneous lake column per atmospheric grid cell (1-D vertical structure)
    - Eddy diffusivity parameterized with optional enhanced mixing for deep lakes
    - Dynamic surface albedo with explicit ice/snow processes
    - Lake thermodynamics forced solely by host near-surface meteorology and radiation

  dimensionality: "1D (vertical)"
  spatial_extent: "Water points within the WRF domain"
  spatial_resolution: "Layered: ≥10 water layers, multiple snow/ice and sediment layers (configurable)"
  variable_spatial_resolution: true

  temporal_extent: "Synchronous with host model integration"
  temporal_resolution: "Same as WRF physics time step"
  variable_temporal_resolution: false

  calibration_tools_data: "Buoy temperature profiles, ice cover climatology, and Great Lakes case studies"

  publications:
    - "Xiao et al., 2016, JAMES – Improving the lake scheme within a coupled WRF–lake model in the Laurentian Great Lakes region"

  conceptual_evaluation: >
    Demonstrates reduced lake-surface-temperature and ice-cover biases when using
    dynamic albedo, tuned diffusivity, and snow-over-ice physics; behaviour consistent
    with lake thermodynamics theory.

  validation_capabilities: >
    Validated against buoy temperature profiles, lake ice cover products, and regional
    atmospheric fields (e.g., near-surface temperature, precipitation).

  sensitivity_analysis: >
    Tested for sensitivity to vertical diffusivity enhancement factors, albedo options,
    and snow/ice parameterizations.

  uncertainty_analysis: "Exploratory parameter sweeps and physics-option ensembles (not probabilistic)."

  license: "Inherited from WRF/CLM components (academic, non-OSI)."

  # Controlled vocabulary: license compatibility tag
  license_incompatibility: proprietary

  landing_page: ""
  distribution_version: "Embedded with WRF v3.6+"

  # Programming language family (controlled vocab)
  programming_language:
    - Fortran
  programming_language_family:
    - Native_C_CPP_Fortran_Family

  # Software requirements with controlled vocab hooks
  software_requirements:
    description: "Built as part of WRF physics; no external coupler required at runtime."
    ffi_family:
      - Native_C_CPP_Fortran_Family
    database_dependencies: []
    io_libraries:
      - NetCDF4_Family

  hardware_requirements: "Same as host WRF (MPI-parallel cluster or HPC)"

  # Controlled vocab-style execution meta
  execution_instructions: >
    Enable the lake physics option in the WRF namelist, supply lake mask and bathymetry,
    compile WRF with the lake scheme, and run real.exe and wrf.exe with the lake tile
    active. Coupling is via in-memory, direct-call interfaces at every physics step.

  parallel_execution: true

  implementation_verification: >
    Reproduces documented improvements in Great Lakes WRF–lake experiments;
    energy and mass conservation checked across the air–lake interface.

  source_code_availability: true

  # Conceptual / provenance meta
  conceptual_consistency_mismatch: >
    Conceptually consistent with CLM4.5 lake physics and WRF boundary-layer schemes;
    remaining discrepancies mainly in extreme ice phenology and deep-lake mixing for
    specific configurations.

  provenance_and_accessibility_gap: >
    Scheme provenance is traceable to CLM4.5/CLM-LISSS documentation and Xiao et al. (2016),
    but there is no standalone, versioned public repository for the embedded WRF implementation.

  # Active-edge (I/O) checks – controlled vocab for formats
  active_edge_io_checks:
    input_formats:
      - in_memory
      - netcdf
    output_formats:
      - in_memory
      - netcdf
    whole_model_information_fields: >
      Run-time metadata for lake state and flux fields follow WRF/NetCDF conventions;
      consistency checked via energy-closure diagnostics and non-negative thickness constraints.

  # A-side (atmosphere) → B-side (lake) forcing
  input:
    description: "Near-surface meteorology and radiative forcing from WRF (A → B, in-memory)."
    format:
      - in_memory
    variables:
      - air_temperature_2m                  # K
      - specific_humidity_2m                # kg kg^-1
      - wind_speed_10m                      # m s^-1
      - wind_u10                            # m s^-1
      - wind_v10                            # m s^-1
      - surface_pressure                    # Pa
      - downwelling_shortwave_radiation     # W m^-2
      - downwelling_longwave_radiation      # W m^-2
      - precipitation_rain_rate             # kg m^-2 s^-1
      - precipitation_snow_rate             # kg m^-2 s^-1
      - near_surface_air_density            # kg m^-3
      - reference_height_wind               # m
    units: "K, kg kg^-1, m s^-1, Pa, W m^-2, kg m^-2 s^-1, m"

  integrated_input:
    - uid: WRF_ARW_v3.6_Lake_2016
      version: "3.6+"
      description: "Host atmosphere providing meteorology and radiation to the lake column"

  # B-side (lake) → A-side (atmosphere) feedbacks
  output:
    format:
      - in_memory
      - netcdf
    variables:
      - lake_skin_temperature               # K
      - lake_ice_fraction                   # 0–1
      - lake_ice_thickness                  # m
      - lake_surface_albedo                 # dimensionless
      - surface_roughness_length_water      # m
      - upward_sensible_heat_flux           # W m^-2
      - upward_latent_heat_flux             # W m^-2
      - upward_longwave_radiation           # W m^-2
      - reflected_shortwave_radiation       # W m^-2
      - surface_evaporation_rate            # kg m^-2 s^-1
      - lake_snow_depth                     # m
    units: "K, dimensionless, m, m, W m^-2, kg m^-2 s^-1"
    verification: >
      Energy closure and non-negativity checks performed each step; evaluated against
      buoy lake-surface temperature and ice-cover products.

  # Integration meta (controlled vocab)
  integration:
    pattern:
    submodels:
      - "Water column heat budget"
      - "Ice/snow thermodynamics"
      - "Sediment heat storage"
    execution_constraints: >
      Tight coupling; synchronous, lockstep execution with the host WRF physics time step,
      with identical grid cell ownership for lake points and strict energy/mass conservation.
    acknowledgment_protocols: >
      Use of the scheme should cite Subin et al. (CLM lake scheme) and Xiao et al. (2016)
      for WRF–lake integration; follow WRF/CLM acknowledgment guidelines.
    data_synchronization: >
      Two-way, in-memory, low-latency exchange every physics step (same timestep, real-time
      from the model’s perspective).

  # Communication & error-handling semantics
  communication_mechanism: >
    Direct-call, in-memory, shared-memory coupling between WRF land-surface/surface-layer
    code and the embedded lake column (no file I/O at the active edge).

  error_handling: >
    Numerical stability checks, non-negative thickness enforcement, and energy-balance
    diagnostics; failures trigger WRF restart/log messages but no autonomous recovery.

  authors:
    - name: "Subin et al.; Xiao et al."
      role: "Lake scheme development, CLM4.5 heritage, and WRF integration"
